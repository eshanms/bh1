<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHOOMIFY | Welcome</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="homepage">
        <div class="hero-side">
            <div class="brand">🌱 BHOOMIFY</div>
            <div style="margin-top: auto;">
                <h1>Build a<br>Greener Future.</h1>
                <p>Track your environmental impact, earn campus green credits, and trade them for exclusive rewards.</p>
            </div>
            <div style="margin-top: auto; font-size: 0.9rem; opacity: 0.7;">
                &copy; 2026 Bhoomify Sustainability Initiative
            </div>
        </div>

        <div class="login-side">
            <div class="login-box">
                <h2>Welcome Back</h2>
                <p>Enter your details to access your dashboard.</p>
                
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter your name">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>

                <button class="btn-main" onclick="login()">Sign In</button>
                
                <p style="margin-top: 25px; font-size: 0.85rem; text-align: center;">
                    New to campus? Contact faculty for an account.
                </p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
