<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHOOMIFY | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="homepage">
        <div class="hero-side">
            <div class="logo-overlay"><img src="logo.png" alt="Logo"></div>
            <div class="hero-content">
                <h1>Build a<br>Greener Future.</h1>
                <p>Earn campus green credits and trade them for exclusive rewards.</p>
                <div class="footer-text">© 2026 Bhoomify Sustainability</div>
            </div>
        </div>
        <div class="login-side">
            <div class="login-box">
                <h2>Welcome</h2>
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Full Name">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••">
                    <div style="margin-top: 8px; font-size: 0.85rem; color: var(--text-muted); cursor: pointer;" onclick="togglePassword()">
                        <input type="checkbox" style="width: auto; margin-right: 5px;"> Show Password
                    </div>
                </div>
                <button class="btn-main" onclick="login()">Sign In</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
