<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHOOMIFY | Welcome</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="homepage">
    <div class="hero-side">
        <div class="logo-overlay">
            <img src="logo.png" alt="Logo">
        </div>
        <div class="hero-content">
            <h1>Build a<br>Greener Future.</h1>
            <p>Track your environmental impact, earn campus green credits, and trade them for exclusive rewards.</p>
            <div class="footer-text">© 2026 Bhoomify Sustainability Initiative</div>
        </div>
    </div>

    <div class="login-side">
        <div class="login-box">
            <h2>Welcome Back</h2>
            <p>Enter your details to access your dashboard.</p>
            
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter your name">
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button class="btn-main" onclick="login()">Sign In</button>
            <p class="help-text">New to campus? Contact faculty for an account.</p>
        </div>
    </div>
</div>
    <script src="app.js"></script>
</body>
</html>
