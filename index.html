<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BHOOMIFY | Build a Greener Future</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="height: 100vh; display: flex; align-items: center; overflow: hidden;">
    <div style="display: flex; width: 100%; height: 100%;">
        <div style="flex: 1.2; background: url('a.jpg') center/cover; position: relative; display: flex; align-items: center; padding: 5%;">
            <div style="position: absolute; inset: 0; background: rgba(6, 78, 59, 0.7);"></div>
            <div style="position: relative; color: white; max-width: 500px;">
                <h1 style="font-size: 4rem; line-height: 1.1; margin-bottom: 1rem;">Build a<br>Greener Future.</h1>
                <p style="font-size: 1.2rem; opacity: 0.9;">Track impact, earn green credits, and trade them for exclusive rewards.</p>
            </div>
        </div>
        <div style="flex: 1; display: flex; align-items: center; justify-content: center; background: white;">
            <div style="width: 100%; max-width: 350px; padding: 2rem;">
                <img src="logo.png" style="height: 50px; margin-bottom: 2rem;">
                <h2>Welcome Back</h2>
                <div style="margin-top: 2rem;">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter your name" style="width:100%; padding:12px; margin: 8px 0 20px; border-radius:8px; border:1px solid #ddd;">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" style="width:100%; padding:12px; margin: 8px 0 20px; border-radius:8px; border:1px solid #ddd;">
                    <button class="btn-primary" style="width: 100%;" onclick="login()">Sign In</button>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
