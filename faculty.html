<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>BHOOMIFY | Faculty Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="initFaculty()">
    <nav class="navbar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="logo.png" class="nav-logo">
            <strong style="letter-spacing: 1px;">FACULTY PORTAL</strong>
        </div>
        <div>
            <span id="adminName" style="margin-right: 15px; font-weight: 600;">Admin</span>
            <button class="btn-outline" onclick="logout()" style="padding: 8px 15px; cursor: pointer;">Logout</button>
        </div>
    </nav>

  <div class="container faculty-grid">
    <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px;">
        <aside>
            <div class="card animate">
                <h3>👥 Manage Students</h3>
                <input type="text" id="newStudentName" placeholder="New Name">
                <input type="password" id="newStudentPass" placeholder="Password">
                <button onclick="addStudent()" class="btn-main">Create Student</button>
                <hr style="margin:20px 0; opacity:0.1;">
                <select id="studentSelect"></select>
                <input type="number" id="pointsUpdate" placeholder="Points to add/subtract">
                <button onclick="updatePoints()" class="btn-main">Update Credits</button>
                <button onclick="deleteStudent()" style="background:#fff1f2; color:#ef4444; border:none; width:100%; padding:10px; margin-top:10px; border-radius:8px; cursor:pointer;">Remove Student</button>
            </div>

            <div class="card animate" style="margin-top:20px;">
                <h3>🛒 Edit Reward Shop</h3>
                <input type="text" id="shopItemName" placeholder="Item Name">
                <input type="number" id="shopItemCost" placeholder="Cost">
                <button onclick="addRewardItem()" class="btn-main" style="background:var(--secondary);">Add Item</button>
            </div>
        </aside>

        <main>
            <div class="card animate">
                <h3>🏆 Real-time Leaderboard</h3>
                
                <div id="leaderboardDisplay"></div>
            </div>

            <div class="card animate" style="margin-top:20px;">
                <h3>📜 System Logs</h3>
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <button onclick="renderLogs('login')" class="btn-outline">Login History</button>
                    <button onclick="renderLogs('redeem')" class="btn-outline">Redemptions</button>
                </div>
                <div id="logTableWrapper" style="max-height: 300px; overflow-y: auto;"></div>
            </div>
        </main>
    </div>
</div>
    <script src.js"></script>
</body>
</html>
