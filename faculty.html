<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BHOOMIFY | Faculty Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="initFaculty()">

<div class="navbar">
    <div style="font-weight:bold; font-size:1.2rem;">👨‍🏫 Faculty Portal</div>
    <button class="logout-btn" onclick="logout()">Logout</button>
</div>
<nav class="navbar" style="padding: 15px 5%;">
    <div class="logo">🌱 BHOOMIFY ADM</div>
    <button class="btn-main" onclick="logout()" style="background: #1e293b;">Logout</button>
</nav>
<div class="app-container">
    <div class="card admin-card">
        <h3>🎯 Authorize Green Credits</h3>
        <select id="studentSelect"></select>
        <input type="text" id="manualName" placeholder="Or type student name manually">
        <input type="number" id="pointsInput" placeholder="Points amount">
        <button onclick="assignPoints()">Update Credits</button>
    </div>

    <div class="card admin-card">
        <h3>🎁 Manage Rewards Catalog</h3>
        <div style="display:flex; gap:10px;">
            <input type="text" id="rewardName" placeholder="Reward Name">
            <input type="number" id="rewardCost" placeholder="Points Cost">
            <input type="text" id="rewardIcon" placeholder="Emoji" style="width:80px;">
        </div>
        <button onclick="addReward()">+ Add Reward to Shop</button>
        <div id="rewardsListAdmin" style="margin-top:15px;"></div>
    </div>

    <div class="card">
        <h3>📜 System Audit Logs</h3>
        <div class="tabs">
            <button class="btn-tab active" id="tabLogin" onclick="showLog('login')">Login History</button>
            <button class="btn-tab" id="tabRedeem" onclick="showLog('redeem')">Reward Redemptions</button>
        </div>
        <table class="log-table">
            <thead><tr id="tableHead"><th>User</th><th>Action</th><th>Timestamp</th></tr></thead>
            <tbody id="logBody"></tbody>
        </table>
    </div>

    <div class="card">
        <h3>🏆 Top Performing Students</h3>
        <div id="leaderboardSection" class="leaderboard-container"></div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
