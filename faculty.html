<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>BHOOMIFY | Faculty Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="initFaculty()">
    <nav class="navbar">
        <div class="logo-box"><img src="logo.png" class="nav-logo"> <strong>FACULTY</strong></div>
        <button class="btn-danger" style="width: auto; padding: 5px 15px;" onclick="logout()">Logout</button>
    </nav>

    <div style="display: grid; grid-template-columns: 350px 1fr; gap: 30px; padding: 30px; max-width: 1400px; margin: auto;">
        <aside>
            <div class="card animate">
                <h3><i class="fas fa-user-plus"></i> Register Student</h3>
                <input type="text" id="regName" placeholder="Name">
                <input type="password" id="regPass" placeholder="Password">
                <button class="btn-main" onclick="addStudent()">Add Student</button>
            </div>
            <div class="card animate">
                <h3><i class="fas fa-coins"></i> Point Management</h3>
                <select id="studentSelect"></select>
                <input type="number" id="pointsInput" placeholder="Amount">
                <button class="btn-main" onclick="assignPoints()">Update Points</button>
                <button class="btn-danger" onclick="removeStudent()">Delete Account</button>
            </div>
            <div class="card animate">
                <h3><i class="fas fa-store"></i> Edit Reward Shop</h3>
                <input type="text" id="rewardName" placeholder="Item Name">
                <input type="number" id="rewardCost" placeholder="Points">
                <button class="btn-main" style="background: var(--secondary);" onclick="addReward()">Add to Shop</button>
            </div>
        </aside>

        <main>
            <div class="card animate">
                <h3>🏆 Campus Leaderboard</h3>
                <div id="leaderboardSection"></div>
            </div>
            <div class="card animate">
                <h3>📜 System Audit Logs</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div>
                        <h4>Redemption History</h4>
                        <div id="redeemLogBody" style="font-size: 0.9rem;"></div>
                    </div>
                    <div>
                        <h4>Login History</h4>
                        <div id="loginBody" style="font-size: 0.9rem;"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
