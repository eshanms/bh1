<!DOCTYPE html>
<html>
<head>
  <title>Faculty Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="header">👨‍🏫 Faculty Control</div>
    <div class="card">
      <h3>Assign Green Credits</h3>
      <input type="text" id="studentName" placeholder="Student Name">
      <input type="number" id="pointsInput" placeholder="Points (e.g. 50)">
      <button onclick="assignPoints()">Update Student Points</button>
    </div>
    <button onclick="logout()" style="background:#666;">Logout</button>
</div>
<script src="app.js"></script>
</body>
</html>
