 

 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHOOMIFY | Faculty Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="initFaculty()">
    <nav class="nav-container">
        <img src="logo.png" alt="BHOOMIFY Logo" class="site-logo">
        <button class="btn-black" onclick="logout()" style="width:auto; padding: 10px 20px;">Sign Out</button>
    </nav>

    <div class="editorial-grid">
        <main>
            <section class="panel">
                <h3>Credit Allocation</h3>
                <p style="margin-bottom: 30px;">Select a student or type a name manually to issue green credits.</p>
                
                <label style="font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--text-heading);">Quick Select</label>
                <select id="studentSelect"></select>
                
                <label style="font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--text-heading);">Manual Search</label>
                <input type="text" id="manualName" placeholder="Enter student name">
                
                <label style="font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: var(--text-heading);">Credits to Issue</label>
                <input type="number" id="pointsInput" placeholder="Amount">
                
                <button class="btn-black" onclick="assignPoints()">Authorize Credits</button>
            </section>

            <section class="panel">
                <h3>User Management</h3>
                <details>
                    <summary>Add New Profile <span>+</span></summary>
                    <div style="padding-top:20px;">
                        <input type="text" id="newStudentName" placeholder="Student Full Name">
                        <input type="password" id="newStudentPass" placeholder="Assign Password">
                        <button class="btn-black" onclick="addStudent()">Register Profile</button>
                    </div>
                </details>
                <div id="studentListAdmin" style="margin-top: 20px;"></div>
            </section>
        </main>

        <aside>
            <div class="panel">
                <h3>Leaderboard</h3>
                <div id="leaderboardSection"></div>
            </div>
        </aside>
    </div>

    <script src="app.js"></script>
</body>
</html>
