<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHOOMIFY | Faculty</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="initFaculty()">
    <nav class="nav-container">
        <img src="logo.png" alt="BHOOMIFY" class="site-logo">
        <button class="btn-black" onclick="logout()" style="width: auto; padding: 10px 20px;">Logout</button>
    </nav>

    <div class="editorial-grid">
        <main>
            <section class="panel">
                <h3>Allocate Green Credits</h3>
                <p style="margin-bottom: 25px; font-size: 0.9rem;">Assign credits for verified environmental campus actions.</p>
                
                <label style="font-size: 0.7rem; font-weight: 800; text-transform: uppercase;">Select Student</label>
                <select id="studentSelect"></select>
                
                <label style="font-size: 0.7rem; font-weight: 800; text-transform: uppercase;">Manual Entry</label>
                <input type="text" id="manualName" placeholder="Search by name...">
                
                <label style="font-size: 0.7rem; font-weight: 800; text-transform: uppercase;">Points to Add</label>
                <input type="number" id="pointsInput" placeholder="Enter amount">
                
                <button class="btn-black" onclick="assignPoints()">Submit Allocation</button>
            </section>

            <section class="panel">
                <h3>Directory Management</h3>
                <div class="input-group">
                    <input type="text" id="newStudentName" placeholder="Full Student Name">
                    <input type="password" id="newStudentPass" placeholder="Temporary Password">
                    <button class="btn-black" onclick="addStudent()">Create Profile</button>
                </div>
                <div id="studentListAdmin" style="margin-top: 30px;"></div>
            </section>
        </main>

        <aside>
            <div class="panel">
                <h3 style="margin-bottom: 20px;">Current Standings</h3>
                <div id="leaderboardSection"></div>
            </div>
        </aside>
    </div>

    <script src="app.js"></script>
</body>
</html>
