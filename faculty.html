<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHOOMIFY | Faculty Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="initFaculty()">

<div class="app-container">
    <nav class="navbar">
        <div class="logo">👨‍🏫 Faculty Panel</div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </nav>

    <div class="admin-menu">
        
        <details class="admin-card" open>
            <summary>🎯 Assign Green Credits</summary>
            <div class="content">
                <select id="studentSelect"></select>
                <div style="text-align:center; margin:10px 0; font-size:0.8rem; color:#888;">— OR ENTER NAME MANUALLY —</div>
                <input type="text" id="manualName" placeholder="Type Student Name">
                <input type="number" id="pointsInput" placeholder="Points Amount">
                <button onclick="assignPoints()">Update Credits</button>
            </div>
        </details>

        <details class="admin-card">
            <summary>👥 Manage Students</summary>
            <div class="content">
                <div class="input-group">
                    <input type="text" id="newStudentName" placeholder="Full Name">
                    <input type="password" id="newStudentPass" placeholder="Set Password">
                    <button onclick="addStudent()">+ Register Student</button>
                </div>
                <div id="studentListAdmin" class="list-container"></div>
            </div>
        </details>

        <details class="admin-card">
            <summary>🎁 Rewards Inventory</summary>
            <div class="content">
                <div class="input-group">
                    <input type="text" id="rewardName" placeholder="Reward Title">
                    <input type="number" id="rewardCost" placeholder="Point Cost">
                    <input type="text" id="rewardIcon" placeholder="Emoji Icon">
                    <button onclick="addReward()">Add to Catalog</button>
                </div>
                <div id="rewardsListAdmin" class="list-container"></div>
            </div>
        </details>

        <div class="card">
            <h3>📊 Live Leaderboard</h3>
            <div id="leaderboardSection"></div>
        </div>

    </div>
</div>

<script src="app.js"></script>
</body>
</html>
