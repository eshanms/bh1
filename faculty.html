<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>BHOOMIFY | Faculty Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="initFaculty()">
    <nav class="navbar">
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="logo.png" class="nav-logo">
            <strong style="letter-spacing: 1px;">FACULTY PORTAL</strong>
        </div>
        <div>
            <span id="adminName" style="margin-right: 15px; font-weight: 600;">Admin</span>
            <button class="btn-outline" onclick="logout()" style="padding: 8px 15px; cursor: pointer;">Logout</button>
        </div>
    </nav>

    <div class="faculty-grid">
        <aside>
            <div class="card" style="margin-bottom: 20px;">
                <h3>👤 Register Student</h3>
                <input type="text" id="regName" placeholder="Full Name">
                <input type="password" id="regPass" placeholder="Assign Password">
                <button class="btn-main" onclick="addStudent()">Create Account</button>
            </div>

            <div class="card" style="margin-bottom: 20px;">
                <h3>🎯 Credit Authorization</h3>
                <select id="studentSelect"></select>
                <input type="number" id="pointsInput" placeholder="Amount (e.g., 50)">
                <button class="btn-main" onclick="assignPoints()">Update Credits</button>
                <button class="btn-danger" onclick="removeStudent()">Delete Account</button>
            </div>

            <div class="card">
                <h3>🛒 Manage Shop</h3>
                <input type="text" id="rewardName" placeholder="Reward Name">
                <input type="number" id="rewardCost" placeholder="Cost (Pts)">
                <button class="btn-main" style="background: var(--dark);" onclick="addReward()">Add Reward</button>
                <div id="rewardListPreview" style="margin-top: 15px; font-size: 0.85rem;"></div>
            </div>
        </aside>

        <main>
            <div class="card" style="margin-bottom: 2rem;">
                <h3>🏆 Live Leaderboard</h3>
                <div id="leaderboardSection">
                    </div>
            </div>

            <div class="card">
                <h3>📜 Audit Logs</h3>
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <button class="btn-outline" onclick="showLog('login')">Login Log</button>
                    <button class="btn-outline" onclick="showLog('redeem')">Redemption Log</button>
                </div>
                <table class="log-table">
                    <thead><tr id="logHeader"></tr></thead>
                    <tbody id="logBody"></tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
