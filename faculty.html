<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHOOMIFY | Faculty Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="initFaculty()">

<div class="app-container">
    <nav class="navbar">
        <div class="logo">👨‍🏫 Faculty Control Panel</div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </nav>

    <div class="admin-menu">
        
        <details class="admin-card">
            <summary>👥 Manage Students & Personas</summary>
            <div class="content">
                <div class="input-group">
                    <input type="text" id="newStudentName" placeholder="New Student Name">
                    <input type="password" id="newStudentPass" placeholder="Set Password">
                    <button onclick="addStudent()">+ Create Student</button>
                </div>
                <div id="studentListAdmin" class="list-container"></div>
            </div>
        </details>

        <details class="admin-card">
            <summary>🎯 Assign Green Credits</summary>
            <div class="content">
                <select id="studentSelect"><option value="">Select Student</option></select>
                <input type="number" id="pointsInput" placeholder="Amount of Points">
                <button onclick="assignPoints()">Update Points</button>
            </div>
        </details>

        <details class="admin-card">
            <summary>🎁 Manage Rewards Inventory</summary>
            <div class="content">
                <div class="input-group">
                    <input type="text" id="rewardName" placeholder="Reward Title">
                    <input type="number" id="rewardCost" placeholder="Point Cost">
                    <input type="text" id="rewardIcon" placeholder="Icon (e.g. 🌲)">
                    <button onclick="addReward()" id="rewardActionBtn">Add Reward</button>
                </div>
                <div id="rewardsListAdmin" class="list-container"></div>
            </div>
        </details>

        <details class="admin-card" open>
            <summary>📊 Live Leaderboard View</summary>
            <div class="content">
                <div id="leaderboardSection">
                    </div>
            </div>
        </details>

    </div>
</div>

<script src="app.js"></script>
</body>
</html>
