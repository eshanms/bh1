<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHOOMIFY | Faculty</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="initFaculty()">
    <div class="app-container">
        <div class="navbar">
            <div class="logo">👨‍🏫 Faculty Admin</div>
            <button class="btn-main" onclick="logout()" style="width: auto; padding: 10px 20px; background: #f1f5f9; color: var(--dark);">Logout</button>
        </div>

        <div class="grid-layout">
            <div class="actions-side">
                <details class="admin-card" open>
                    <summary>🎯 Assign Green Credits</summary>
                    <div class="content">
                        <select id="studentSelect"></select>
                        <input type="text" id="manualName" placeholder="Or type student name manually" style="margin-top: 10px;">
                        <input type="number" id="pointsInput" placeholder="Amount of points (e.g. 50)">
                        <button class="btn-main" onclick="assignPoints()">Update Credits</button>
                    </div>
                </details>

                <details class="admin-card">
                    <summary>👥 Manage Student Database</summary>
                    <div class="content">
                        <input type="text" id="newStudentName" placeholder="Full Name">
                        <input type="password" id="newStudentPass" placeholder="Password">
                        <button class="btn-main" onclick="addStudent()">Add Student</button>
                        <div id="studentListAdmin" style="margin-top: 20px;"></div>
                    </div>
                </details>
            </div>

            <div class="display-side">
                <div class="card">
                    <h3>🏆 Live Leaderboard</h3>
                    <div id="leaderboardSection"></div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
