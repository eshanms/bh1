<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHOOMIFY | Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="initStudent()">

    <nav class="navbar">
    <div class="logo-box">
        <img src="logo.png">
        <h1>BHOOMIFY</h1>
    </div>
    <button class="btn-outline" onclick="logout()">Logout</button>
</nav>

<div class="container">
    <div class="card" style="background: linear-gradient(135deg, #065f46, #047857); color: white; border: none;">
        <p style="text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px;">Your Eco Balance</p>
        <h1 id="points" style="font-size: 3.5rem; margin: 10px 0;">00</h1>
        <p><strong id="userName">User</strong> • <span id="userLevel">Seedling</span></p>
    </div>

    <div class="grid-2">
        <div class="card">
            <h3>🎁 Available Rewards</h3>
            <div id="rewardsSection" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                </div>
        </div>
        <div class="card">
            <h3>🏆 Campus Leaderboard</h3>
            <div id="leaderboardSection"></div>
        </div>
    </div>
</div>

    <script src="app.js"></script>
</body>
</html>
