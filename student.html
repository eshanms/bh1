<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHOOMIFY | Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="initStudent()">

<div class="app-container">
    <nav class="navbar">
        <div class="logo">🌱 BHOOMIFY</div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </nav>

    <div class="user-welcome">
        <h1>Welcome, <span id="userName">User</span>!</h1>
        <p>Rank: <strong id="userLevel">Seed 🌰</strong></p>
        <div class="points-badge">
            <span id="points">0</span> <small>Points</small>
        </div>
    </div>

    <div class="card">
        <h3>🏆 Eco-Leaderboard</h3>
        <div id="leaderboardSection">
            </div>
    </div>

    <div class="card">
        <h3>🎁 Claim Rewards</h3>
        <div id="rewardsSection" class="rewards-grid"></div>
    </div>

    <div class="card">
        <h3>📜 Activity History</h3>
        <div id="history"></div>
    </div>

    <div class="card" style="text-align: center;">
        <h3>📄 Project Report</h3>
        <a href="BHOOMIFY.pdf" target="_blank" class="download-btn">View Documentation (PDF)</a>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
