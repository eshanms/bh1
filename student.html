<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHOOMIFY | Student</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="initStudent()">
    <div class="app-container">
        <div class="navbar">
            <div class="logo">🌱 BHOOMIFY</div>
            <button class="btn-main" onclick="logout()" style="width: auto; padding: 10px 20px; background: #f1f5f9; color: var(--dark);">Logout</button>
        </div>

        <div class="user-card">
            <p style="text-transform: uppercase; letter-spacing: 2px; font-weight: 700; color: var(--text-muted); font-size: 0.8rem;">Current Balance</p>
            <div class="points-display" id="points">0</div>
            <p><span id="userName">User</span> • <span id="userLevel">Seed</span></p>
        </div>

        <div class="grid-layout">
            <div>
                <div class="card">
                    <h3>🎁 Claim Rewards</h3>
                    <div id="rewardsSection" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
                </div>
                
                <div class="card">
                    <h3>📜 History</h3>
                    <div id="history"></div>
                </div>
            </div>

            <div>
                <div class="card">
                    <h3>🏆 Leaderboard</h3>
                    <div id="leaderboardSection"></div>
                </div>
                <a href="BHOOMIFY.pdf" target="_blank" class="btn-main" style="text-decoration:none; background: #1e293b; text-align:center;">Project Report (PDF)</a>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
