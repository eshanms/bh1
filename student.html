<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHOOMIFY | Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="initStudent()">

    <nav class="navbar">
        <div class="logo-container">
            <img src="logo.png" alt="Bhoomify" class="nav-logo">
            <span class="logo-text">BHOOMIFY</span>
        </div>
        <div class="admin-meta">
            <button class="logout-btn-dark" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="app-container">
        <div class="user-card">
            <p style="text-transform: uppercase; letter-spacing: 2px; font-weight: 700; opacity: 0.8; font-size: 0.8rem;">Current Balance</p>
            <div class="points-display" id="points">0</div>
            <p><span id="userName" style="font-weight: 800;">User</span> • <span id="userLevel">Seed</span></p>
        </div>

        <div class="grid-layout">
            <div>
                <div class="card">
                    <h3>🎁 Claim Rewards</h3>
                    <div id="rewardsSection" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        </div>
                </div>
                
                <div class="card">
                    <h3>📜 Activity History</h3>
                    <div id="history">
                        </div>
                </div>
            </div>

            <div>
                <div class="card">
                    <h3>🏆 Leaderboard</h3>
                    <div id="leaderboardSection">
                        </div>
                </div>
                
                <a href="BHOOMIFY.pdf" target="_blank" class="btn-main" style="text-decoration:none; display: block; text-align:center; background: #1e293b;">
                    Project Report (PDF)
                </a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
