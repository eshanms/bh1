<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhoomify | Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body onload="initStudent()">
    <nav class="navbar">
        <div class="logo-box">
            <img src="logo.png" class="nav-logo">
            <strong style="letter-spacing: 1px; color: var(--secondary);">BHOOMIFY</strong>
        </div>
        <button class="btn-main" style="width: auto; padding: 8px 20px;" onclick="logout()">Logout</button>
    </nav>

    <div style="max-width: 1200px; margin: 2rem auto; padding: 0 20px;">
        <div class="card animate" style="background: linear-gradient(135deg, #065f46, #10b981); color: white; border: none; text-align: center; padding: 40px;">
            <p style="text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; opacity: 0.9;">Total Green Credits</p>
            <h1 id="points" style="font-size: 4rem; margin: 10px 0;">0</h1>
            <p style="font-size: 1.1rem;"><strong id="userName">Student</strong> • <span id="userLevel">Seedling</span></p>
        </div>

        <div style="display: grid; grid-template-columns: 1.6fr 1fr; gap: 30px;">
            <section class="card animate">
                <h3><i class="fas fa-gift" style="color: var(--primary);"></i> Available Rewards</h3>
                <div id="rewardsSection" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px;">
                    </div>
            </section>

            <section class="card animate">
                <h3><i class="fas fa-trophy" style="color: #fbbf24;"></i> Campus Leaderboard</h3>
                <div id="leaderboardSection" style="margin-top: 20px;">
                    </div>
            </section>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
