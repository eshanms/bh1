<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHOOMIFY | Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="initStudent()">

<div class="app-container">
    <nav class="navbar">
        <div class="logo">🌱 BHOOMIFY</div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </nav>

    <div class="user-welcome">
        <h1>Hi, <span id="userName">Student</span>!</h1>
        <p>Status: <strong id="userLevel">Seed 🌰</strong></p>
        <div class="points-badge">
            <span id="points">0</span>
        </div>
        <small style="color:#888; font-weight:bold; letter-spacing:1px; text-transform:uppercase;">Green Credits</small>
    </div>

    <div class="card">
        <h3>🏆 Eco Leaderboard</h3>
        <div id="leaderboardSection"></div>
    </div>

    <div class="card">
        <h3>🎁 Rewards Catalog</h3>
        <div id="rewardsSection" class="rewards-grid"></div>
    </div>

    <div class="card">
        <h3>📜 My Impact History</h3>
        <div id="history"></div>
    </div>

    <div class="card" style="text-align: center; border: 2px dashed #ddd;">
        <h3>📄 Documentation</h3>
        <a href="BHOOMIFY.pdf" target="_blank" class="download-btn" style="background:var(--text); text-decoration:none; display:inline-block; padding:10px 20px; color:white; border-radius:8px; margin-top:10px;">View Project Report</a>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
